<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawingboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #canvas {
            display: block;
            background-color: #0d0d0d;
            cursor: crosshair;
        }

        .toolbar {
            position: fixed;
            top: 12px;
            left: 12px;
            background-color: rgba(26, 26, 26, 0.95);
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            z-index: 100;
        }

        .toolbar-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
        }

        .toolbar-info {
            font-size: 11px;
            line-height: 1.5;
            color: #666;
            margin-bottom: 12px;
        }

        .toolbar-info div {
            margin: 4px 0;
        }

        .toolbar-button {
            display: block;
            width: 100%;
            padding: 8px 12px;
            margin: 4px 0;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .toolbar-button:hover {
            background-color: #333;
            border-color: #555;
        }

        .toolbar-button:active {
            background-color: #444;
        }

    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="toolbar">
        <div class="toolbar-title">Drawingboard</div>
        <div class="toolbar-info">
            <div><strong>Shift</strong> + drag: Rectangle</div>
            <div><strong>Ctrl</strong> + drag: Arrow</div>
            <div><strong>Space</strong> + drag (or Middle Mouse): Pan</div>
            <div>Click: Add text</div>
            <div><strong>Esc</strong> + click: Delete object</div>
            <div><strong>Delete</strong>: Clear all</div>
        </div>
        <button class="toolbar-button" id="clearBtn">Clear Canvas</button>
        <button class="toolbar-button" id="downloadBtn">Download as PNG</button>
    </div>

    <script>
        (() => {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const clearBtn = document.getElementById('clearBtn');
            const downloadBtn = document.getElementById('downloadBtn');

            const CONFIG = {
                bg: '#0d0d0d',
                stroke: '#4a9eff',
                text: '#e0e0e0',
                lineWidth: 2,
                fontSize: 16,
                arrowHead: 14,
                gridSize: 30,
                gridColor: 'rgba(255,255,255,0.06)'
            };
            const fontFamily = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
            const EXPORT_PADDING = Math.max(CONFIG.arrowHead, CONFIG.fontSize, CONFIG.lineWidth * 2);

            let shapes = [];
            let isDrawing = false;
            let tool = null; // 'rect' | 'arrow'
            let start = { x: 0, y: 0 }; // world-space

            // Very small "camera" for panning (screen = world + pan)
            let pan = { x: 0, y: 0 };
            let spaceDown = false;
            let escDown = false;
            let isPanning = false;
            let panLast = { x: 0, y: 0 };

            function mod(n, m) {
                return ((n % m) + m) % m;
            }

            function screenToWorld(p) {
                return { x: p.x - pan.x, y: p.y - pan.y };
            }

            function worldToScreen(p) {
                return { x: p.x + pan.x, y: p.y + pan.y };
            }

            function getFont() {
                return `${CONFIG.fontSize}px ${fontFamily}`;
            }

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                draw();
            }

            function pos(e) {
                const r = canvas.getBoundingClientRect();
                return { x: e.clientX - r.left, y: e.clientY - r.top };
            }

            function applyTextStyles(renderCtx) {
                renderCtx.font = getFont();
                renderCtx.fillStyle = CONFIG.text;
            }

            function drawGrid(renderCtx, width, height, renderPan) {
                renderCtx.strokeStyle = CONFIG.gridColor;
                renderCtx.lineWidth = 1;

                const startX = mod(renderPan.x, CONFIG.gridSize);
                const startY = mod(renderPan.y, CONFIG.gridSize);

                for (let x = startX; x <= width; x += CONFIG.gridSize) {
                    renderCtx.beginPath();
                    renderCtx.moveTo(x, 0);
                    renderCtx.lineTo(x, height);
                    renderCtx.stroke();
                }
                for (let y = startY; y <= height; y += CONFIG.gridSize) {
                    renderCtx.beginPath();
                    renderCtx.moveTo(0, y);
                    renderCtx.lineTo(width, y);
                    renderCtx.stroke();
                }
            }

            function drawRect(renderCtx, x1, y1, x2, y2) {
                const x = Math.min(x1, x2);
                const y = Math.min(y1, y2);
                const w = Math.abs(x2 - x1);
                const h = Math.abs(y2 - y1);
                renderCtx.strokeRect(x, y, w, h);
            }

            function drawArrow(renderCtx, x1, y1, x2, y2) {
                const angle = Math.atan2(y2 - y1, x2 - x1);
                renderCtx.beginPath();
                renderCtx.moveTo(x1, y1);
                renderCtx.lineTo(x2, y2);
                renderCtx.stroke();

                const hl = CONFIG.arrowHead;
                renderCtx.beginPath();
                renderCtx.moveTo(x2, y2);
                renderCtx.lineTo(x2 - hl * Math.cos(angle - Math.PI / 6), y2 - hl * Math.sin(angle - Math.PI / 6));
                renderCtx.lineTo(x2 - hl * Math.cos(angle + Math.PI / 6), y2 - hl * Math.sin(angle + Math.PI / 6));
                renderCtx.closePath();
                renderCtx.fill();
            }

            function drawText(renderCtx, x, y, text) {
                renderCtx.fillText(text, x, y);
            }

            function measureTextWidth(text, renderCtx = ctx) {
                applyTextStyles(renderCtx);
                return renderCtx.measureText(text).width;
            }

            function getShapeBounds(shape) {
                if (shape.type === 'text') {
                    const width = measureTextWidth(shape.text);
                    return {
                        minX: shape.x,
                        maxX: shape.x + width,
                        minY: shape.y - CONFIG.fontSize,
                        maxY: shape.y
                    };
                }

                return {
                    minX: Math.min(shape.x1, shape.x2),
                    maxX: Math.max(shape.x1, shape.x2),
                    minY: Math.min(shape.y1, shape.y2),
                    maxY: Math.max(shape.y1, shape.y2)
                };
            }

            function getDrawingBounds() {
                if (shapes.length === 0) return null;

                return shapes.reduce((bounds, shape) => {
                    const shapeBounds = getShapeBounds(shape);
                    return {
                        minX: Math.min(bounds.minX, shapeBounds.minX),
                        minY: Math.min(bounds.minY, shapeBounds.minY),
                        maxX: Math.max(bounds.maxX, shapeBounds.maxX),
                        maxY: Math.max(bounds.maxY, shapeBounds.maxY)
                    };
                }, getShapeBounds(shapes[0]));
            }

            function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
                const dx = x2 - x1;
                const dy = y2 - y1;
                const lenSq = dx * dx + dy * dy;
                if (lenSq === 0) return Math.hypot(px - x1, py - y1);
                const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / lenSq));
                const cx = x1 + t * dx;
                const cy = y1 + t * dy;
                return Math.hypot(px - cx, py - cy);
            }

            function isPointOnShape(p, s, tolerance = 8) {
                if (s.type === 'rect') {
                    const minX = Math.min(s.x1, s.x2) - tolerance;
                    const maxX = Math.max(s.x1, s.x2) + tolerance;
                    const minY = Math.min(s.y1, s.y2) - tolerance;
                    const maxY = Math.max(s.y1, s.y2) + tolerance;
                    return p.x >= minX && p.x <= maxX && p.y >= minY && p.y <= maxY;
                }

                if (s.type === 'arrow') {
                    return pointToSegmentDistance(p.x, p.y, s.x1, s.y1, s.x2, s.y2) <= tolerance;
                }

                if (s.type === 'text') {
                    const width = measureTextWidth(s.text);
                    return p.x >= s.x - tolerance &&
                        p.x <= s.x + width + tolerance &&
                        p.y >= s.y - CONFIG.fontSize - tolerance &&
                        p.y <= s.y + tolerance;
                }

                return false;
            }

            function deleteShapeAt(p) {
                for (let i = shapes.length - 1; i >= 0; i--) {
                    if (isPointOnShape(p, shapes[i])) {
                        shapes.splice(i, 1);
                        return true;
                    }
                }
                return false;
            }

            function draw(renderCtx = ctx, width = canvas.width, height = canvas.height, renderPan = pan) {
                renderCtx.fillStyle = CONFIG.bg;
                renderCtx.fillRect(0, 0, width, height);

                drawGrid(renderCtx, width, height, renderPan);

                renderCtx.strokeStyle = CONFIG.stroke;
                renderCtx.fillStyle = CONFIG.stroke;
                renderCtx.lineWidth = CONFIG.lineWidth;
                applyTextStyles(renderCtx);

                for (const s of shapes) {
                    if (s.type === 'rect') {
                        const a = { x: s.x1 + renderPan.x, y: s.y1 + renderPan.y };
                        const b = { x: s.x2 + renderPan.x, y: s.y2 + renderPan.y };
                        renderCtx.strokeStyle = CONFIG.stroke;
                        renderCtx.lineWidth = CONFIG.lineWidth;
                        drawRect(renderCtx, a.x, a.y, b.x, b.y);
                    } else if (s.type === 'arrow') {
                        const a = { x: s.x1 + renderPan.x, y: s.y1 + renderPan.y };
                        const b = { x: s.x2 + renderPan.x, y: s.y2 + renderPan.y };
                        renderCtx.strokeStyle = CONFIG.stroke;
                        renderCtx.fillStyle = CONFIG.stroke;
                        renderCtx.lineWidth = CONFIG.lineWidth;
                        drawArrow(renderCtx, a.x, a.y, b.x, b.y);
                    } else if (s.type === 'text') {
                        const p = { x: s.x + renderPan.x, y: s.y + renderPan.y };
                        renderCtx.fillStyle = CONFIG.text;
                        drawText(renderCtx, p.x, p.y, s.text);
                    }
                }
            }

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    spaceDown = true;
                    if (!isPanning && !isDrawing) canvas.style.cursor = 'grab';
                }
                if (e.code === 'Escape') {
                    escDown = true;
                    isDrawing = false;
                    tool = null;
                    draw();
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.code === 'Space') {
                    spaceDown = false;
                    if (!isPanning) canvas.style.cursor = 'crosshair';
                }
                if (e.code === 'Escape') {
                    escDown = false;
                }
            });

            canvas.addEventListener('wheel', (e) => {
                // Trackpad / wheel panning (keeps the page from scrolling)
                e.preventDefault();
                pan.x -= e.deltaX;
                pan.y -= e.deltaY;
                draw();
            }, { passive: false });

            window.addEventListener('mouseup', () => {
                if (isPanning) {
                    isPanning = false;
                    canvas.style.cursor = spaceDown ? 'grab' : 'crosshair';
                }
            });

            canvas.addEventListener('mousedown', (e) => {
                const pScreen = pos(e);

                // Pan: Space+drag or middle-mouse drag
                if (spaceDown || e.button === 1) {
                    isPanning = true;
                    panLast = pScreen;
                    canvas.style.cursor = 'grabbing';
                    return;
                }

                // Only left-click draws/creates text
                if (e.button !== 0) return;

                if (escDown) {
                    const pWorld = screenToWorld(pScreen);
                    if (deleteShapeAt(pWorld)) draw();
                    return;
                }

                start = screenToWorld(pScreen);

                if (e.shiftKey) {
                    tool = 'rect';
                    isDrawing = true;
                    return;
                }

                if (e.ctrlKey || e.metaKey) {
                    tool = 'arrow';
                    isDrawing = true;
                    return;
                }

                const text = window.prompt('Text:', '');
                if (text && text.trim()) {
                    shapes.push({ type: 'text', x: start.x, y: start.y, text: text.trim() });
                    draw();
                }
            });

            canvas.addEventListener('mousemove', (e) => {
                const pScreen = pos(e);

                if (isPanning) {
                    const dx = pScreen.x - panLast.x;
                    const dy = pScreen.y - panLast.y;
                    pan.x += dx;
                    pan.y += dy;
                    panLast = pScreen;
                    draw();
                    return;
                }

                if (!isDrawing) return;

                const pWorld = screenToWorld(pScreen);
                draw();

                const a = worldToScreen(start);
                const b = worldToScreen(pWorld);

                ctx.strokeStyle = CONFIG.stroke;
                ctx.fillStyle = CONFIG.stroke;
                ctx.lineWidth = CONFIG.lineWidth;

                if (tool === 'rect') drawRect(ctx, a.x, a.y, b.x, b.y);
                if (tool === 'arrow') drawArrow(ctx, a.x, a.y, b.x, b.y);
            });

            canvas.addEventListener('mouseup', (e) => {
                const pScreen = pos(e);

                if (isPanning) {
                    isPanning = false;
                    canvas.style.cursor = spaceDown ? 'grab' : 'crosshair';
                    return;
                }

                if (!isDrawing) return;

                const pWorld = screenToWorld(pScreen);
                shapes.push({ type: tool, x1: start.x, y1: start.y, x2: pWorld.x, y2: pWorld.y });
                isDrawing = false;
                tool = null;
                draw();
            });

            clearBtn.addEventListener('click', () => {
                shapes = [];
                draw();
            });

            downloadBtn.addEventListener('click', () => {
                const bounds = getDrawingBounds();
                const exportCanvas = document.createElement('canvas');
                const exportCtx = exportCanvas.getContext('2d');

                if (bounds) {
                    exportCanvas.width = Math.ceil(bounds.maxX - bounds.minX + EXPORT_PADDING * 2);
                    exportCanvas.height = Math.ceil(bounds.maxY - bounds.minY + EXPORT_PADDING * 2);
                    draw(exportCtx, exportCanvas.width, exportCanvas.height, {
                        x: EXPORT_PADDING - bounds.minX,
                        y: EXPORT_PADDING - bounds.minY
                    });
                } else {
                    exportCanvas.width = canvas.width;
                    exportCanvas.height = canvas.height;
                    draw(exportCtx, exportCanvas.width, exportCanvas.height, pan);
                }

                const link = document.createElement('a');
                link.href = exportCanvas.toDataURL('image/png');
                link.download = `drawingboard-${Date.now()}.png`;
                link.click();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Delete') {
                    shapes = [];
                    draw();
                }
            });

            window.addEventListener('resize', resize);
            resize();
        })();
    </script>
</body>
</html>
